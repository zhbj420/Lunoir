appId: com.lunoir.app
productName: Lunoir
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - '!**/*.map'
# Electron ships ~50 locale packs (~41MB) for *Chromium's own* UI strings — nothing
# to do with this app's text. Keep only what a user might actually see.
electronLanguages:
  - en-US
  - zh-CN
extraResources:
  - from: resources/mpv
    to: mpv
    # the shinchiro bundle also carries mpv's manual, icons, key-binding chart and
    # its own install/uninstall/updater scripts — none of which belong inside a
    # player that merely embeds mpv. d3dcompiler_43 stays: mpv may still want it to
    # compile shaders on some setups, and 4MB isn't worth a broken renderer.
    filter:
      - mpv.exe
      - fonts.conf
      - d3dcompiler_43.dll
  - from: resources/mediainfo
    to: mediainfo
    filter:
      - '**/*'
# Registering these only makes Lunoir *appear* in "Open with" and in Windows'
# Default apps list — Windows hasn't let an installer seize existing defaults since
# Win8, so nothing is taken over behind the user's back. Portable builds can't
# register (no installer), but "Open with" still works there via argv.
fileAssociations:
  - ext:
      - mkv
      - mp4
      - m4v
      - mov
      - avi
      - wmv
      - webm
      - flv
      - ts
      - m2ts
      - mts
      - mpg
      - mpeg
      - vob
      - rmvb
      - 3gp
    name: Video
    description: Video
    role: Viewer
  - ext:
      - mp3
      - flac
      - m4a
      - aac
      - wav
      - ogg
      - opus
      - wma
      - ape
    name: Audio
    description: Audio
    role: Viewer
  - ext:
      - m3u
      - m3u8
    name: Playlist
    description: Playlist
    role: Viewer

win:
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-setup.${ext}
portable:
  artifactName: ${productName}-${version}-portable.${ext}
