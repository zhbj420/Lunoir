ShortDescription: A beautiful media player for Windows, powered by mpv (like IINA).
Description: |-
  Lunoir is a modern, frameless, frosted-glass media player for Windows, built on an
  mpv core (gpu-next: Dolby Vision / HDR10 / HDR10+, 10-bit). It adds frame-accurate
  playback (timecode and frame-number readout, single-frame stepping), Live TV / IPTV
  with recording, an experimental Timeline for stitching and trimming a folder of clips,
  subtitle styling, and 9 interface languages. Open source (MIT), no telemetry or ads.
